services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sql_server_dentasmart
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=Password12345678
      - MSSQL_PID=Developer
    ports:
      - "1435:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
      - ./schema.sql:/usr/src/app/schema.sql
      - ./create-db.sh:/usr/src/app/create-db.sh
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        /opt/mssql/bin/sqlservr &
        /bin/bash /usr/src/app/create-db.sh
        wait
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P Password12345678 -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  sqlserver_data:
